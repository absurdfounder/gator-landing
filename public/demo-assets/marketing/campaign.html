<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Northstar — Command layer for AI agents</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #0c0a09; color: #fafaf9; }
    .hero { padding: 36px 32px 40px; background: linear-gradient(145deg, #3f6b00 0%, #284800 40%, #1c1917 100%); min-height: 220px; }
    .eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #c4d9a0; font-weight: 700; }
    h1 { font-size: 28px; margin: 14px 0 10px; max-width: 340px; line-height: 1.15; letter-spacing: -0.02em; }
    p { font-size: 14px; color: rgba(250,250,249,0.82); max-width: 360px; line-height: 1.6; }
    .cta { display: inline-block; margin-top: 20px; background: #fafaf9; color: #1c1917; font-size: 12px; font-weight: 700; padding: 11px 18px; border-radius: 8px; letter-spacing: 0.04em; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #292524; }
    .stat { background: #1c1917; padding: 18px 20px; }
    .stat strong { display: block; font-size: 22px; color: #9db866; font-weight: 700; }
    .stat span { font-size: 9px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; display: block; }
    .proof { padding: 16px 32px; background: #faf9f6; color: #57534e; font-size: 11px; border-top: 1px solid #e7e5e4; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="eyebrow">Q2 campaign · pillar page</div>
    <h1>Your agents. One command layer.</h1>
    <p>Multi-agent ops for lean teams — traced tickets, shared memory, human review gates.</p>
    <span class="cta">Book a demo →</span>
  </div>
  <div class="stats">
    <div class="stat"><strong>3.2×</strong><span>Output velocity</span></div>
    <div class="stat"><strong>11</strong><span>Agents live</span></div>
    <div class="stat"><strong>0</strong><span>Context lost</span></div>
  </div>
  <div class="proof">Parser reliability story · landing + carousel + nurture sequence</div>
</body>
</html>
